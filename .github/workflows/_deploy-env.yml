name: Deploy to Environment (internal)

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      environment:
        type: string
        required: true
      platform_project:
        type: string
        required: true
      has_frontend:
        type: boolean
        required: true
      has_backend:
        type: boolean
        required: true
      frontend_dir:
        type: string
        required: false
        default: frontend
      frontend_framework:
        type: string
        required: false
        default: react
      backend_dir:
        type: string
        required: false
        default: backend
      backend_language:
        type: string
        required: false
        default: python
      backend_port:
        type: number
        required: false
        default: 8080
      frontend_changed:
        type: boolean
        required: false
        default: true
      backend_changed:
        type: boolean
        required: false
        default: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  auth:
    name: Authenticate
    runs-on: ubuntu-latest
    outputs:
      wif_provider: ${{ steps.wif-config.outputs.provider }}
      service_account: ${{ steps.wif-config.outputs.sa }}

    steps:
      - name: Resolve WIF config
        id: wif-config
        run: |
          # These would be stored as org/repo variables in the platform project
          # For now we read from environment-specific secrets
          if [ "${{ inputs.environment }}" == "prod" ]; then
            echo "provider=${{ secrets.PLATFORM_WIF_PROD }}" >> $GITHUB_OUTPUT
            echo "sa=${{ secrets.PLATFORM_SA_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "provider=${{ secrets.PLATFORM_WIF_DEV }}" >> $GITHUB_OUTPUT
            echo "sa=${{ secrets.PLATFORM_SA_DEV }}" >> $GITHUB_OUTPUT
          fi

  # ─── Frontend ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Firebase Hosting
    needs: [auth]
    runs-on: ubuntu-latest
    if: inputs.has_frontend && inputs.frontend_changed
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.auth.outputs.wif_provider }}
          service_account: ${{ needs.auth.outputs.service_account }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ inputs.frontend_dir }}/package-lock.json

      - name: Install & Build
        run: |
          cd ${{ inputs.frontend_dir }}
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ inputs.platform_project }}
          # Each app gets its own Firebase site: <app_name>-<env>
          # firebase.json in the platform project routes hosting by site
          target: ${{ inputs.app_name }}-${{ inputs.environment }}

  # ─── Backend ───────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    needs: [auth]
    runs-on: ubuntu-latest
    if: inputs.has_backend && inputs.backend_changed
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.auth.outputs.wif_provider }}
          service_account: ${{ needs.auth.outputs.service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build & Push
        run: |
          IMAGE="europe-west3-docker.pkg.dev/${{ inputs.platform_project }}/paaga-images/${{ inputs.app_name }}:${{ github.sha }}"
          
          docker build \
            -t "$IMAGE" \
            -t "europe-west3-docker.pkg.dev/${{ inputs.platform_project }}/paaga-images/${{ inputs.app_name }}:latest" \
            ${{ inputs.backend_dir }}/
          
          docker push "$IMAGE"
          docker push "europe-west3-docker.pkg.dev/${{ inputs.platform_project }}/paaga-images/${{ inputs.app_name }}:latest"
          
          echo "image=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-${{ inputs.environment }}"
          
          gcloud run deploy "$SERVICE_NAME" \
            --image="$image" \
            --region=europe-west3 \
            --platform=managed \
            --allow-unauthenticated \
            --port=${{ inputs.backend_port }} \
            --set-env-vars="ENVIRONMENT=${{ inputs.environment }},APP_NAME=${{ inputs.app_name }}" \
            --memory=512Mi \
            --cpu=1 \
            --max-instances=10 \
            --timeout=300 \
            --cpu-throttling \
            --project=${{ inputs.platform_project }}
          
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region=europe-west3 \
            --project=${{ inputs.platform_project }} \
            --format="value(status.url)")
          
          echo "🚀 Backend deployed: $URL"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **${{ inputs.app_name }}** deployed to **${{ inputs.environment }}**\n\nBackend: Cloud Run service \`${{ inputs.app_name }}-${{ inputs.environment }}\``
            })
