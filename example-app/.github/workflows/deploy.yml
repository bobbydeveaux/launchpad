name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

# This is the ONLY file a developer needs to add.
# Everything else is handled by the StackRamp platform.

jobs:
  deploy:
    if: github.event.action != 'closed'
    permissions:
      id-token: write       # required for WIF / GCP auth
      contents: read        # required to checkout code
      pull-requests: write  # required to post PR preview URLs
    uses: bobbydeveaux/stackramp/.github/workflows/platform.yml@main
    secrets: inherit

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      id-token: write
      contents: read
    uses: bobbydeveaux/stackramp/.github/workflows/_cleanup-preview.yml@main
    secrets: inherit
